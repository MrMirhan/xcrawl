  multer: "^2.2.0"
  tar: "^7.5.19"
  hono: "^4.12.25"
  "@hono/node-server": "^1.19.10"
  path-to-regexp: "^8.4.0"
  handlebars: "^4.7.9"
  fast-uri: "^3.1.2"
  form-data: "^4.0.6"
  defu: "^6.1.5"
  lodash: "^4.18.0"
  effect: "^3.20.0"
  "anymatch>picomatch": "^2.3.2"
  "micromatch>picomatch": "^2.3.2"
