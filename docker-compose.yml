services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xcrawl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xcrawl}
      POSTGRES_DB: ${POSTGRES_DB:-xcrawl}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xcrawl}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-xcrawl}:${POSTGRES_PASSWORD:-xcrawl}@postgres:5432/${POSTGRES_DB:-xcrawl}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - STORAGE_PATH=/data/storage
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage-data:/data/storage
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: node dist/main.js
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-xcrawl}:${POSTGRES_PASSWORD:-xcrawl}@postgres:5432/${POSTGRES_DB:-xcrawl}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - STORAGE_PATH=/data/storage
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage-data:/data/storage
    restart: unless-stopped
    deploy:
      replicas: 2

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
      - SEARXNG_SECRET=${SEARXNG_SECRET:-xcrawl-searxng-secret}
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  garage:
    image: dxflrs/garage:v1.1.0
    ports:
      - "3900:3900"   # S3 API
      - "3902:3902"   # Admin API
    environment:
      GARAGE_ALLOW_WORLD_READABLE_SECRETS: "true"
    volumes:
      - garage-data:/var/lib/garage/data
      - garage-meta:/var/lib/garage/meta
      - ./docker/garage.toml:/etc/garage.toml:ro
    profiles:
      - s3

volumes:
  postgres-data:
  redis-data:
  storage-data:
  searxng-data:
  garage-data:
  garage-meta:
