name: Changelog

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to generate changelog for (e.g. v1.2.0) — only needed for a manual re-run'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No moving "v1" tag exists on this action (only fixed v1.x.x tags) — pinned
      # to the latest v1 release instead.
      - name: Run Changelog CI
        uses: saadmk11/changelog-ci@v1.2.0
        with:
          release_version: ${{ github.event.inputs.release_version || github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
