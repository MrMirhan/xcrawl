name: Changelog

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version being released (e.g. v1.2.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No moving "v1" tag exists on this action (only fixed v1.x.x tags) — pinned
      # to the latest v1 release instead.
      - name: Run Changelog CI
        uses: saadmk11/changelog-ci@v1.2.0
        with:
          release_version: ${{ github.event.inputs.release_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
