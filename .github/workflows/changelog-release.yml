name: Stamp Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    # github.event.release.tag_name is the release's tag directly from the webhook payload —
    # more reliable than GITHUB_REF_NAME/github.ref_name, whose resolution rules are
    # documented per-event-type and not worth trusting blindly for a non-push, non-PR event.
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Stamp Unreleased section with release version and date
        run: |
          VERSION="${RELEASE_TAG#v}"
          DATE=$(date -u +%Y-%m-%d)
          if ! grep -q '^## \[Unreleased\]$' CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no [Unreleased] section to stamp."
            exit 1
          fi
          sed -i "s/^## \[Unreleased\]\$/## [Unreleased]\n\n## [${VERSION}] - ${DATE}/" CHANGELOG.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
            exit 0
          fi
          git commit -m "chore: stamp CHANGELOG.md for ${RELEASE_TAG}"
          git push origin HEAD:main
