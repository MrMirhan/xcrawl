name: Changelog Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test the changelog checker itself
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
        run: node --test scripts/check-changelog.test.mjs

      - name: Verify CHANGELOG.md was updated under [Unreleased]
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          node scripts/check-changelog.mjs "origin/${{ github.base_ref }}"
