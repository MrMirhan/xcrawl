name: Changelog Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md was updated
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if ! git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -qx 'CHANGELOG.md'; then
            echo "::error::CHANGELOG.md was not updated in this PR. Add a line under [Unreleased] describing the change, or add the 'skip-changelog' label if this PR doesn't need one (docs/CI/chore)."
            exit 1
          fi
